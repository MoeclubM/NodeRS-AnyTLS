name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: noders-anytls

jobs:
  build-gnu:
    name: Build GNU release bundle (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build GNU release binary in manylinux2014
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            -e BIN_NAME="${BIN_NAME}" \
            -e RELEASE_TAG="${RELEASE_TAG:-dev}" \
            -e HOST_UID="${uid}" \
            -e HOST_GID="${gid}" \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/tmp/rustup \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64:latest \
            bash -lc '
              set -euo pipefail
              yum install -y curl git tar gzip which
              if ! command -v rustup >/dev/null 2>&1; then
                curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
              fi
              export PATH="${CARGO_HOME}/bin:${PATH}"
              cargo fetch --locked
              bash scripts/verify-pure-rust.sh
              cargo test --locked --offline
              cargo build --locked --release --target x86_64-unknown-linux-gnu
              bash scripts/package-release-bundle.sh \
                --release-tag "${RELEASE_TAG}" \
                --target x86_64-unknown-linux-gnu \
                --asset-suffix linux-amd64
              chown -R "${HOST_UID}:${HOST_GID}" dist target
            '

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-amd64
          path: dist/*
          if-no-files-found: error

  build-musl:
    name: Build musl release bundle (linux-amd64-musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          bash scripts/package-release-bundle.sh \
            --release-tag "${RELEASE_TAG:-dev}" \
            --target x86_64-unknown-linux-musl \
            --asset-suffix linux-amd64-musl

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-amd64-musl
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Linux release assets
    needs: [build-gnu, build-musl]
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
