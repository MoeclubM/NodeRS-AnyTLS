name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: noders-anytls
  TARGET: x86_64-unknown-linux-gnu
  ASSET_SUFFIX: linux-amd64

jobs:
  build:
    name: Build Linux release bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline

      - name: Build release binary
        run: cargo build --locked --release --target ${{ env.TARGET }}

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-dev}"
          package_dir="dist/${BIN_NAME}-${tag}-${ASSET_SUFFIX}"
          mkdir -p "$package_dir/packaging/systemd"
          cp "target/${TARGET}/release/${BIN_NAME}" "$package_dir/${BIN_NAME}"
          cp README.md LICENSE config.example.toml "$package_dir/"
          cp scripts/install.sh "$package_dir/install.sh"
          cp scripts/upgrade.sh "$package_dir/upgrade.sh"
          cp packaging/systemd/noders-anytls.service "$package_dir/packaging/systemd/noders-anytls.service"
          chmod +x "$package_dir/install.sh" "$package_dir/upgrade.sh" "$package_dir/${BIN_NAME}"
          tar -C dist -czf "${package_dir}.tar.gz" "$(basename "$package_dir")"
          sha256sum "${package_dir}.tar.gz" > "${package_dir}.tar.gz.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundle
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Linux release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
