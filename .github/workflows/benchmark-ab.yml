name: Benchmark AB

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_tier:
        description: quick for the fast CI profile, full for the extended weak-link suite
        required: false
        default: full
      compare_count:
        description: Total previous tags to compare; leave blank to use the selected tier default
        required: false
        default: ""
      sing_box_version:
        description: sing-box release tag or latest
        required: false
        default: latest
      long_connection_seconds:
        description: Duration in seconds for long upload and download benchmark cases; leave blank to use the selected tier default
        required: false
        default: ""
      idle_seconds:
        description: Duration in seconds for idle keepalive stability cases; leave blank to use the selected tier default
        required: false
        default: ""
      curve_sample_interval:
        description: Throughput curve sampling interval in seconds; leave blank to use the selected tier default
        required: false
        default: ""
      steady_state_warmup_seconds:
        description: Warmup duration before long-connection throughput and curve sampling; leave blank to use the selected tier default
        required: false
        default: ""
      lossy_repeats:
        description: Repeat count for lossy benchmark cases; leave blank to use the selected tier default
        required: false
        default: ""

jobs:
  version-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 musl-tools openssl

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Run version comparison benchmark
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          benchmark_tier="${{ github.event.inputs.benchmark_tier }}"
          compare_count="${{ github.event.inputs.compare_count }}"
          sing_box_version="${{ github.event.inputs.sing_box_version }}"
          long_connection_seconds="${{ github.event.inputs.long_connection_seconds }}"
          idle_seconds="${{ github.event.inputs.idle_seconds }}"
          curve_sample_interval="${{ github.event.inputs.curve_sample_interval }}"
          steady_state_warmup_seconds="${{ github.event.inputs.steady_state_warmup_seconds }}"
          lossy_repeats="${{ github.event.inputs.lossy_repeats }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            benchmark_tier="${benchmark_tier:-quick}"
          else
            benchmark_tier="${benchmark_tier:-full}"
          fi
          if [ "$benchmark_tier" = "quick" ]; then
            compare_count="${compare_count:-0}"
            long_connection_seconds="${long_connection_seconds:-8}"
            idle_seconds="${idle_seconds:-35}"
            curve_sample_interval="${curve_sample_interval:-1.0}"
            steady_state_warmup_seconds="${steady_state_warmup_seconds:-1.0}"
            lossy_repeats="${lossy_repeats:-1}"
          else
            compare_count="${compare_count:-2}"
            long_connection_seconds="${long_connection_seconds:-20}"
            idle_seconds="${idle_seconds:-65}"
            curve_sample_interval="${curve_sample_interval:-1.0}"
            steady_state_warmup_seconds="${steady_state_warmup_seconds:-2.0}"
            lossy_repeats="${lossy_repeats:-2}"
          fi
          sing_box_version="${sing_box_version:-latest}"
          enable_netem_args=()
          if [ "$benchmark_tier" = "full" ]; then
            enable_netem_args+=(--enable-netem)
          fi
          python3 scripts/benchmark_ab_report.py \
            --output-dir target/benchmark-ab \
            --target x86_64-unknown-linux-musl \
            --benchmark-tier "$benchmark_tier" \
            --compare-count "$compare_count" \
            --sing-version "$sing_box_version" \
            --long-connection-seconds "$long_connection_seconds" \
            --idle-seconds "$idle_seconds" \
            --curve-sample-interval "$curve_sample_interval" \
            --steady-state-warmup-seconds "$steady_state_warmup_seconds" \
            --lossy-repeats "$lossy_repeats" \
            "${enable_netem_args[@]}"

      - name: Publish version comparison summary
        if: always()
        run: |
          echo "## Version Compare" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [ -f target/benchmark-ab/report.md ]; then
            cat target/benchmark-ab/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Benchmark report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload version comparison artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-ab-versions
          path: |
            target/benchmark-ab/report.md
            target/benchmark-ab/summary.json
            target/benchmark-ab/benchmark-ab-report.json
            target/benchmark-ab/benchmark-ab-report.csv
            target/benchmark-ab/logs
          if-no-files-found: warn
